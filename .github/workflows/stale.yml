name: Mark Stale Issues and PRs
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
permissions:
  issues: write
  pull-requests: write
jobs:
  stale:
    runs-on: magnon-enterprise-runners
    timeout-minutes: 10
    steps:
      - uses: actions/stale@28ca1036281a5e5922ead5184a1bbf96e5fc984e  # v9.0.0
        with:
          stale-issue-message: 'This issue has been inactive for 60 days and is marked stale. Comment to keep it open.'
          stale-pr-message: 'This PR has been inactive for 30 days and is marked stale. Push a commit or comment to keep it open.'
          close-issue-message: 'Closing due to inactivity. Reopen if still relevant.'
          close-pr-message: 'Closing due to inactivity. Reopen and push a commit to resume.'
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,security,blocked'
          exempt-pr-labels: 'pinned,blocked,do-not-close'
